/disparity_node:
  ros__parameters:
    P1: 600.0
    P2: 2400.0
    approximate_sync: true
    approximate_sync_tolerance_seconds: 0.0
    correlation_window_size: 7
    disp12_max_diff: 1
    disparity_range: 192
    image_transport: raw
    min_disparity: 0
    prefilter_cap: 31
    prefilter_size: 9
    qos_overrides:
      /parameter_events:
        publisher:
          depth: 1000
          durability: volatile
          history: keep_last
          reliability: reliable
      /stereo/disparity:
        publisher:
          depth: 1
          history: keep_last
          reliability: reliable
      /stereo/left/camera_info:
        subscription:
          depth: 5
          history: keep_last
          reliability: best_effort
      /stereo/left/image_rect:
        subscription:
          depth: 5
          history: keep_last
          reliability: best_effort
      /stereo/right/camera_info:
        subscription:
          depth: 5
          history: keep_last
          reliability: best_effort
      /stereo/right/image_rect:
        subscription:
          depth: 5
          history: keep_last
          reliability: best_effort
    queue_size: 10
    sgbm_mode: 0
    speckle_range: 2
    speckle_size: 200
    start_type_description_service: true
    stereo_algorithm: 1
    texture_threshold: 10
    uniqueness_ratio: 5.0
    use_sim_time: false
    use_system_default_qos: false

